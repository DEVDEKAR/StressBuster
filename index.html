<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress Buster - Comic Nurse Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= BODY NOTEBOOK THEME ================= */

body{
margin:0;
font-family:'Comic Neue',sans-serif;
text-align:center;
background:#fdf6e3;
overflow-x:hidden;

/* Notebook lines */
background-image:
linear-gradient(#d6eaf8 1px, transparent 1px),
linear-gradient(90deg, #ff7675 3px, transparent 3px);
background-size:100% 40px, 60px 100%;
}

/* Spiral Binding */
body::before{
content:"";
position:fixed;
left:10px;
top:0;
width:20px;
height:100%;
background:
repeating-radial-gradient(circle, black 0 6px, transparent 7px 20px);
z-index:0;
}

/* Floating Doodles */
body::after{
content:"⭐ 💖 🩹 ⭐ 💖 🩹 ⭐ 💖";
position:fixed;
top:20%;
right:5%;
font-size:40px;
opacity:0.15;
animation:float 8s infinite linear;
z-index:0;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0);}
}

/* Nurse Watermark */
.watermark{
position:fixed;
bottom:10%;
left:50%;
transform:translateX(-50%);
font-size:160px;
opacity:0.05;
z-index:0;
}

/* ================= HERO ================= */

.hero{
background:#ff4d4d;
color:white;
padding:25px;
font-family:'Bangers';
font-size:36px;
letter-spacing:2px;
text-shadow:3px 3px #000;
border-bottom:6px solid #000;
position:relative;
z-index:1;
}

.hero span{
display:block;
font-family:'Comic Neue';
font-size:18px;
margin-top:5px;
}

/* PAGE CONTROL */
.page{display:none;padding:20px;position:relative;z-index:1;}
.active{display:block;}

/* DOMAIN CARDS */
.domain-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.domain-card{
background:white;
border:4px solid black;
border-radius:20px;
padding:25px;
width:230px;
cursor:pointer;
font-family:'Bangers';
font-size:22px;
box-shadow:8px 8px 0px black;
transition:0.3s;
position:relative;
}

.domain-card:hover{
transform:scale(1.05) rotate(-1deg);
background:#fff9c4;
}

/* PROBLEM PANEL */
.problem-panel{
background:white;
border:4px solid black;
border-radius:20px;
padding:25px;
max-width:700px;
margin:auto;
box-shadow:8px 8px 0px black;
text-align:left;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px 20px;
font-family:'Bangers';
font-size:18px;
background:#00b894;
color:white;
border:4px solid black;
border-radius:12px;
cursor:pointer;
box-shadow:5px 5px 0px black;
}

button:hover{
background:#019875;
transform:translateY(-2px);
}

/* ================= FLIP CARDS ================= */

.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:20px;
}

.card{
width:95%;
max-width:300px;
height:230px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
transition:transform 0.6s ease, box-shadow 0.4s ease;
transform-style:preserve-3d;
position:relative;
cursor:pointer;
}

/* Breathing glow animation when flipped */
.card.flipped .card-inner{
transform:rotateY(180deg);
animation:breathe 2.5s infinite;
}

@keyframes breathe{
0%{box-shadow:0 0 10px rgba(0,184,148,0.5);}
50%{box-shadow:0 0 25px rgba(0,184,148,1);}
100%{box-shadow:0 0 10px rgba(0,184,148,0.5);}
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
border:4px solid black;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
box-shadow:8px 8px 0px black;
}

/* FRONT */
.card-front{
background:#ff7675;
color:white;
font-size:20px;
font-weight:bold;
}

/* BACK */
.card-back{
background:#55efc4;
color:#00332e;
transform:rotateY(180deg);
text-align:left;
font-size:15px;
overflow:auto;
}

.card-back::before{
content:"🩺 Nurse Prescription:";
display:block;
font-weight:bold;
margin-bottom:10px;
}

/* TOP BAR */
.top-bar{
position:sticky;
top:0;
background:#ffeaa7;
padding:10px;
z-index:2;
border-bottom:3px solid black;
}

</style>
</head>

<body>

<div class="watermark">👩‍⚕️</div>

<div class="hero">
STRESS BUSTER 🩺
<span>Your Friendly Mental Health Nurse</span>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Select Area of Concern</h2>
<div class="domain-container">
<div class="domain-card" onclick="selectDomain('Academic')">📚 Academic</div>
<div class="domain-card" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</div>
<div class="domain-card" onclick="selectDomain('Cognitive')">🧠 Cognitive</div>
<div class="domain-card" onclick="selectDomain('Affective')">❤️ Affective</div>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<div class="top-bar">
<button onclick="goHome()">⬅ Back</button>
</div>
<h2 id="domainTitle"></h2>
<div class="problem-panel" id="problemList"></div>
<button onclick="showCards()">Get Nurse Advice 💡</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="top-bar">
<button onclick="goBackProblems()">⬅ Back</button>
</div>
<h2>Tap Card for Prescription 📝</h2>
<div class="card-container" id="cards"></div>
</div>

<script>

/* Your same data object remains here */
const data = {
Academic:{
"Exam Anxiety":["Practice deep breathing 5 minutes before exam.","Visualize calm performance."],
"Sleep Disturbance":["Avoid screens before bed.","Keep fixed sleep schedule."],
"Fear of Failure":["Break syllabus into small goals.","Track effort not perfection."],
"Result-Related Stress":["Focus on improvement.","Avoid unhealthy comparison."],
"Performance Pressure":["Take hourly short breaks.","Prepare a study plan."],
"Lack of Motivation":["Use Pomodoro method.","Reward small achievements."],
"Overwhelmed by Syllabus":["Prioritize important topics.","Start with easier chapter."],
"Appetite Changes":["Eat small meals.","Stay hydrated."]
},
Psychomotor:{
"Restlessness":["Try grounding exercise.","Do light stretching."],
"Pacing":["Practice guided relaxation.","Listen to calm music."],
"Fatigue":["Take short nap.","Improve nutrition."],
"Social Withdrawal":["Talk to someone daily.","Spend time outdoors."],
"Loss of Appetite / Overeating":["Follow meal timing.","Avoid emotional triggers."]
},
Cognitive:{
"Poor Concentration":["Remove distractions.","Keep phone away."],
"Forgetfulness":["Revise within 24 hours.","Write short notes."],
"Negative Thinking":["Positive self-talk.","Challenge negative thought."],
"Self-Doubt":["Recall past success.","List your strengths."],
"Decision-Making Difficulty":["Set 5-min timer.","List pros & cons."]
},
Affective:{
"Irritability":["Pause 5 minutes.","Drink water and reset."],
"Mood Swings":["Maintain routine.","Exercise lightly."],
"Sadness":["Talk to someone.","Write feelings."],
"Emotional Exhaustion":["Relax 15 minutes.","Reduce workload temporarily."]
}
};

let currentDomain="";

function selectDomain(domain){
currentDomain=domain;
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
document.getElementById("domainTitle").innerText=domain+" Concerns";

let list="";
for(let problem in data[domain]){
list+=`<label><input type="checkbox" value="${problem}"> ${problem}</label>`;
}
document.getElementById("problemList").innerHTML=list;
}

function showCards(){
const selected=document.querySelectorAll('#problemList input:checked');
const container=document.getElementById("cards");
container.innerHTML="";

selected.forEach(item=>{
let problem=item.value;
let solutions=data[currentDomain][problem];

container.innerHTML+=`
<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">
<div class="card-front">${problem}</div>
<div class="card-back">
<ul>
<li>${solutions[0]}</li>
<li>${solutions[1]}</li>
</ul>
</div>
</div>
</div>`;
});

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function goHome(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page1").classList.add("active");
}

function goBackProblems(){
document.getElementById("page3").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

</script>

</body>
</html>
