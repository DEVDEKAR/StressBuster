<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRESS BUSTER - Comic Nurse Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Comic Neue',sans-serif;
background:linear-gradient(135deg,#e3f2fd,#fce4ec);
text-align:center;
}

/* HERO */
.hero{
background:#e53935;
color:white;
padding:25px;
font-family:'Bangers';
font-size:34px;
letter-spacing:2px;
text-shadow:2px 2px #000;
border-bottom:6px solid #000;
}

.hero span{
font-size:20px;
display:block;
font-family:'Comic Neue';
margin-top:5px;
}

/* PAGE CONTROL */
.page{display:none;padding:20px;}
.active{display:block;}

/* DOMAIN CARDS */
.domain-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.domain-card{
background:#ffffff;
border:4px solid #000;
border-radius:18px;
padding:25px;
width:230px;
cursor:pointer;
font-family:'Bangers';
font-size:22px;
box-shadow:6px 6px 0px #000;
transition:0.2s;
}

.domain-card:hover{
transform:scale(1.05);
background:#e1f5fe;
}

/* CHECKBOX PANEL */
.problem-panel{
background:white;
border:4px solid black;
border-radius:18px;
padding:25px;
max-width:700px;
margin:auto;
box-shadow:6px 6px 0px black;
text-align:left;
}

.problem-panel label{
display:block;
margin:10px 0;
font-size:18px;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px 20px;
font-family:'Bangers';
font-size:18px;
background:#00897b;
color:white;
border:4px solid black;
border-radius:12px;
cursor:pointer;
box-shadow:4px 4px 0px black;
}

button:hover{
background:#00695c;
}

/* FLIP CARDS */
.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:20px;
}

.card{
width:95%;
max-width:300px;
height:220px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
transition:transform 0.6s;
transform-style:preserve-3d;
position:relative;
cursor:pointer;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
border:4px solid black;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-weight:bold;
box-shadow:6px 6px 0px black;
}

.card-front{
background:#ef5350;
color:white;
font-size:20px;
}

.card-back{
background:#4db6ac;
color:#00332e;
transform:rotateY(180deg);
text-align:left;
font-size:15px;
}

/* BACK BUTTON */
.top-bar{
position:sticky;
top:0;
background:#fff3e0;
padding:10px;
z-index:1000;
}

@media(min-width:768px){
.card{width:260px;}
}

</style>
</head>

<body>

<div class="hero">
🩺 STRESS BUSTER
<span>Your Friendly Mental Health Nurse 💬</span>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Select Area of Concern</h2>

<div class="domain-container">
<div class="domain-card" onclick="selectDomain('Academic')">📚 Academic</div>
<div class="domain-card" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</div>
<div class="domain-card" onclick="selectDomain('Cognitive')">🧠 Cognitive</div>
<div class="domain-card" onclick="selectDomain('Affective')">❤️ Affective</div>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<div class="top-bar">
<button onclick="goHome()">⬅ Back</button>
</div>
<h2 id="domainTitle"></h2>
<div class="problem-panel" id="problemList"></div>
<button onclick="showCards()">Get Nurse Advice 💡</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="top-bar">
<button onclick="goBackProblems()">⬅ Back</button>
</div>
<h2>Tap Card for Prescription 📝</h2>
<div class="card-container" id="cards"></div>
</div>

<script>

const data={

Academic:{
"Exam Anxiety":[
"Practice deep breathing 5 minutes before exam.",
"Visualize yourself writing calmly and confidently."
],
"Sleep Disturbance":[
"Stop phone use 30 minutes before bed.",
"Maintain fixed sleep and wake-up time daily."
],
"Fear of Failure":[
"Break syllabus into small goals.",
"Track progress instead of perfection."
],
"Result-Related Stress":[
"Focus on next improvement step.",
"Avoid comparing marks with others."
],
"Performance Pressure":[
"Take 5–10 minute break every hour.",
"Prepare a simple study timetable."
],
"Lack of Motivation":[
"Use 25-minute Pomodoro method.",
"Reward yourself after completing targets."
],
"Overwhelmed by Syllabus":[
"Make priority topic list.",
"Start with easiest chapter to build momentum."
],
"Appetite Changes":[
"Eat small regular meals.",
"Stay hydrated throughout study hours."
]
},

Psychomotor:{
"Restlessness":[
"Practice grounding exercise.",
"Stretch for 5 minutes to release tension."
],
"Pacing":[
"Sit and do guided relaxation.",
"Listen to calming instrumental music."
],
"Fatigue":[
"Take 20-minute power nap.",
"Improve nutrition and hydration."
],
"Social Withdrawal":[
"Talk to one trusted person daily.",
"Spend 10 minutes in sunlight."
],
"Loss of Appetite / Overeating":[
"Follow regular meal timings.",
"Avoid emotional eating triggers."
]
},

Cognitive:{
"Poor Concentration":[
"Study in distraction-free area.",
"Keep phone in another room."
],
"Forgetfulness":[
"Revise within 24 hours.",
"Use short written summaries."
],
"Negative Thinking":[
"Practice positive self-talk.",
"Challenge one negative thought daily."
],
"Self-Doubt":[
"Recall one past success.",
"Write down your strengths."
],
"Decision-Making Difficulty":[
"Set 5-minute decision timer.",
"List pros and cons quickly."
]
},

Affective:{
"Irritability":[
"Take 5-minute pause.",
"Drink water and reset."
],
"Mood Swings":[
"Maintain regular routine.",
"Exercise lightly for 15 minutes."
],
"Sadness":[
"Talk to trusted person.",
"Write feelings in journal."
],
"Emotional Exhaustion":[
"Take 15-minute relaxation break.",
"Reduce workload for one day."
]
}

};

let currentDomain="";

function selectDomain(domain){
currentDomain=domain;
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
document.getElementById("domainTitle").innerText=domain+" Concerns";

let list="";
for(let problem in data[domain]){
list+=`<label><input type="checkbox" value="${problem}"> ${problem}</label>`;
}
document.getElementById("problemList").innerHTML=list;
}

function showCards(){
const selected=document.querySelectorAll('#problemList input:checked');
const container=document.getElementById("cards");
container.innerHTML="";

selected.forEach(item=>{
let problem=item.value;
let solutions=data[currentDomain][problem];

container.innerHTML+=`
<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">
<div class="card-front">${problem}</div>
<div class="card-back">
<ul>
<li>${solutions[0]}</li>
<li>${solutions[1]}</li>
</ul>
</div>
</div>
</div>`;
});

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function goHome(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page1").classList.add("active");
}

function goBackProblems(){
document.getElementById("page3").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

</script>

</body>
</html>
