<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashamana: Nurturing the Caregiver</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL ================= */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Comic Neue', cursive;
    overflow: hidden;
    background-color: #f0f8ff;
}

/* Persistent Header */
.app-header {
    position: absolute;
    top: 0;
    width: 100%;
    text-align: center;
    z-index: 1000;
    padding: 10px 0;
}

.app-header h1 {
    font-family: 'Bangers';
    font-size: 40px;
    color: #2d3436;
    margin: 0;
    text-shadow: 2px 2px 0px #fff;
}

.page {
    display: none;
    width: 100vw;
    height: 100vh;
    position: relative;
    padding-top: 60px; /* Space for header */
    box-sizing: border-box;
}

.active { display: flex; }

/* ================= PAGE 1 (Nurse Left) ================= */
#page1 {
    background: #62c6e2; 
    flex-direction: row;
}

.p1-left {
    flex: 1.2;
    background: url('1.jpg') no-repeat bottom center;
    background-size: contain;
}

.p1-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding-right: 50px;
}

.domain-btn {
    width: 250px;
    padding: 15px;
    background: white;
    border: 4px solid black;
    border-radius: 15px;
    font-family: 'Bangers';
    font-size: 22px;
    cursor: pointer;
    box-shadow: 6px 6px 0px black;
    transition: 0.2s;
}

.domain-btn:hover { transform: scale(1.05); background: #ffeaa7; }

/* ================= PAGE 2 (Medical Border) ================= */
#page2 {
    background: white;
    background-image: url('2.jpg');
    background-size: cover;
    background-position: center;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.problem-container {
    width: 45%;
    max-height: 50%;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border: 3px solid #62c6e2;
    border-radius: 20px;
    overflow-y: auto;
    text-align: left;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* ================= PAGE 3 (Nurse Left, Solutions) ================= */
#page3 {
    background: #d48e8e;
    background-image: url('3.jpg');
    background-size: cover;
    background-position: center;
    display: none;
}

/* The White Quote Box Layout */
.quote-box {
    position: absolute;
    right: 5%;
    top: 55%;
    transform: translateY(-50%);
    width: 55%;
    height: 65%;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 30px;
    box-sizing: border-box;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    overflow-y: auto;
    z-index: 2;
}

/* ================= FLIP CARDS ================= */
.card {
    width: 220px;
    height: 160px;
    perspective: 1000px;
}

.card-inner {
    width: 100%; height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
    position: relative;
}

.card.flipped .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border: 3px solid black;
    border-radius: 12px;
    padding: 15px;
    box-sizing: border-box;
    text-align: center;
}

.card-front { 
    background: #ff7675; 
    color: white; 
    font-family: 'Bangers'; 
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.card-back { 
    background: #55efc4; 
    transform: rotateY(180deg); 
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    text-align: left;
    font-size: 14px;
    line-height: 1.4;
}

.sol-item {
    margin-bottom: 8px;
    border-bottom: 1px dashed rgba(0,0,0,0.1);
    width: 100%;
    padding-bottom: 4px;
}

/* Navigation Buttons */
.nav-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-family: 'Bangers';
    background: #ff3b3b;
    color: white;
    border: 3px solid black;
    cursor: pointer;
    z-index: 1100;
}
</style>
</head>
<body>

<header class="app-header">
    <h1>PRASHAMANA: NURTURING THE CAREGIVER</h1>
</header>

<div id="page1" class="page active">
    <div class="p1-left"></div>
    <div class="p1-right">
        <h2 style="font-family:'Bangers'; font-size: 35px; color: white; text-shadow: 2px 2px black;">CHOOSE DOMAIN</h2>
        <button class="domain-btn" onclick="selectDomain('Academic')">📚 Academic</button>
        <button class="domain-btn" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
        <button class="domain-btn" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
        <button class="domain-btn" onclick="selectDomain('Affective')">💛 Affective</button>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 Home</button>
    <h2 id="domainTitle" style="font-family:'Bangers'; font-size: 35px; margin-top: 20px; color: #d63031;"></h2>
    <div class="problem-container" id="problemList"></div>
    <button class="domain-btn" style="margin-top: 20px; background:#2ecc71;" onclick="showCards()">VIEW SOLUTIONS</button>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅ Back</button>
    <div class="quote-box" id="cards"></div>
</div>

<script>
const data = {
    Academic: {
        "Exam Anxiety": ["Deep breathing for 5 mins.", "Visualize success."],
        "Sleep Disturbance": ["No phone 30m before bed.", "Stick to a fixed schedule."],
        "Fear of Failure": ["Set small manageable goals.", "Reward small wins."]
    },
    Psychomotor: {
        "Restlessness": ["Engage in meditation.", "Practice 4-4-4 breathing."],
        "Fatigue": ["Take a 20m power nap.", "Perform light stretching."]
    },
    Cognitive: {
        "Concentration": ["Find a quiet environment.", "Keep phone on silent mode."],
        "Self-Doubt": ["Recall past achievements.", "Write 1 strength daily."]
    },
    Affective: {
        "Irritability": ["Take a 5 min pause.", "Practice slow breathing."],
        "Emotional Exhaustion": ["Dedicate 15m to relaxation.", "Take a short outdoor walk."]
    }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Challenges";
    
    let list = "";
    for (let prob in data[domain]) {
        list += `<label style="display:block; font-size:20px; margin-bottom:12px; cursor:pointer;">
                 <input type="checkbox" value="${prob}" style="transform:scale(1.3); margin-right:10px;"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelectorAll('#problemList input:checked');
    if (selected.length === 0) {
        alert("Please select at least one problem!");
        return;
    }

    const container = document.getElementById("cards");
    container.innerHTML = "";

    selected.forEach(item => {
        let p = item.value;
        let solutions = data[currentDomain][p];
        let solHtml = solutions.map((s, index) => `<div class="sol-item"><b>${index + 1}.</b> ${s}</div>`).join("");

        container.innerHTML += `
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">${p}</div>
                    <div class="card-back">
                        <strong style="margin-bottom:10px; color:#d63031;">Solutions:</strong>
                        ${solHtml}
                        <small style="margin-top:auto; font-style:italic; opacity:0.7;">Click to flip back</small>
                    </div>
                </div>
            </div>`;
    });

    document.getElementById("page2").classList.remove("active");
    document.getElementById("page3").style.display = "flex";
}

function goHome() {
    document.getElementById("page2").classList.remove("active");
    document.getElementById("page1").classList.add("active");
}

function goBackProblems() {
    document.getElementById("page3").style.display = "none";
    document.getElementById("page2").classList.add("active");
}
</script>
</body>
</html>
