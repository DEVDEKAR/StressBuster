<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&family=Bungee&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL ================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Comic Neue', cursive;
            background-color: #f0f8ff;
            overflow-x: hidden;
        }

        /* Responsive Header with Different Font */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 0;
            border-bottom: 5px solid #2d3436;
            z-index: 1000;
        }

        .app-header h1 {
            font-family: 'Bungee', cursive; /* Distinct title font */
            font-size: clamp(1rem, 4vw, 2rem);
            color: #d63031;
            margin: 0;
            letter-spacing: 2px;
        }

        .page {
            display: none;
            width: 100vw;
            min-height: 100vh;
            position: relative;
            padding-top: 90px;
            box-sizing: border-box;
        }

        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ================= PAGE 1 (Landing) ================= */
        #page1 { background: #62c6e2; overflow: hidden; }

        .p1-layout {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            width: 95%;
            max-width: 1200px;
            z-index: 2;
        }

        .nurse-frame {
            flex: 1;
            min-width: 300px;
            height: 60vh;
            background: url('1.jpg') no-repeat center bottom;
            background-size: contain;
        }

        .domain-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            min-width: 300px;
        }

        /* Aesthetic Medical Illustrations (Floating Icons) */
        .decoration {
            position: absolute;
            font-size: 50px;
            opacity: 0.2;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* ================= PAGE 2 (Selection) ================= */
        #page2 { background-color: #e3f2fd; }

        .medical-border-frame {
            width: 90%;
            max-width: 1000px;
            min-height: 70vh;
            background: url('2.jpg') no-repeat center;
            background-size: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #2d3436;
            border-radius: 30px;
            padding: 40px 20px;
            position: relative;
        }

        .problem-content {
            width: 85%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 20px;
            border: 3px solid #62c6e2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-height: 50vh;
            overflow-y: auto;
        }

        /* ================= PAGE 3 (Solutions) ================= */
        #page3 {
            background: #d48e8e url('3.jpg') no-repeat center;
            background-size: cover;
        }

        .quote-bubble-area {
            width: 90%;
            max-width: 850px;
            height: 65vh;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 40px;
            border: 5px solid #2d3436;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px;
            overflow-y: auto;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* ================= UI COMPONENTS ================= */
        .btn-main {
            width: 280px;
            padding: 18px;
            background: white;
            border: 4px solid #2d3436;
            border-radius: 18px;
            font-family: 'Bangers';
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 7px 7px 0px #2d3436;
            transition: 0.2s;
        }

        .btn-main:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0px #2d3436; background: #ffeaa7; }

        .nav-btn {
            position: absolute;
            top: 100px;
            left: 20px;
            background: #ff3b3b;
            color: white;
            border: 3px solid black;
            padding: 10px 20px;
            font-family: 'Bangers';
            cursor: pointer;
            z-index: 1001;
            border-radius: 10px;
        }

        .card { width: 260px; height: 200px; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: 4px solid #2d3436; border-radius: 20px;
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        
        .card-front { background: #ff7675; color: white; font-family: 'Bangers'; justify-content: center; align-items: center; font-size: 1.5rem; text-align: center; }
        .card-back { background: #55efc4; transform: rotateY(180deg); text-align: left; }

        .sol-list { margin: 10px 0 0 0; padding: 0 0 0 20px; font-weight: bold; font-size: 1.05rem; line-height: 1.6; }

        /* Responsive */
        @media (max-width: 768px) {
            .p1-layout { flex-direction: column; padding-bottom: 50px; }
            .nurse-frame { height: 40vh; width: 100%; }
            .medical-border-frame { height: auto; padding: 60px 20px; border-radius: 15px; background-size: cover; }
            .problem-content { width: 90%; max-height: 40vh; }
            .quote-bubble-area { width: 95%; padding: 20px; height: 75vh; }
            .nav-btn { top: 75px; left: 10px; padding: 5px 10px; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>Prashamana: Nurturing the Caregiver</h1>
</header>

<div id="page1" class="page active">
    <div class="decoration" style="top:15%; left:10%;">💉</div>
    <div class="decoration" style="bottom:20%; left:5%;">💊</div>
    <div class="decoration" style="top:25%; right:15%;">🏥</div>
    <div class="decoration" style="bottom:15%; right:10%;">❤️</div>
    <div class="decoration" style="top:50%; left:2%;">🩹</div>

    <div class="p1-layout">
        <div class="nurse-frame"></div>
        <div class="domain-menu">
            <h2 style="font-family:'Bangers'; color: white; text-shadow: 3px 3px black; font-size: 2.5rem; margin-bottom: 20px;">CHOOSE DOMAIN</h2>
            <button class="btn-main" onclick="selectDomain('Academic')">📚 Academic</button>
            <button class="btn-main" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
            <button class="btn-main" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
            <button class="btn-main" onclick="selectDomain('Affective')">💛 Affective</button>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 HOME</button>
    <div class="medical-border-frame">
        <div class="problem-content">
            <h2 id="domainTitle" style="font-family:'Bangers'; color: #d63031; text-align: center; font-size: 2rem;"></h2>
            <div id="problemList"></div>
            <button class="btn-main" style="width: 100%; background: #2ecc71; margin-top: 25px;" onclick="showCards()">VIEW SOLUTIONS</button>
        </div>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅ BACK</button>
    <div class="quote-bubble-area" id="cards"></div>
</div>

<script>
    const data = {
        Academic: {
            "Exam Anxiety": ["Practice deep breathing for 5 minutes.", "Focus on preparation, not the result."],
            "Sleep Disturbance": ["Stop phone use 30 mins before bed.", "Maintain a regular sleep schedule."],
            "Fear of Failure": ["Break syllabus into small goals.", "Celebrate small learning wins."],
            "Result-Related Stress": ["Focus on improvement steps.", "Avoid comparing marks with others."],
            "Performance Pressure": ["5-10 min break every 1 hour.", "Set realistic study targets."],
            "Lack of Motivation": ["Use the Pomodoro technique.", "Reward yourself after a task."],
            "Overwhelmed Syllabus": ["Priority list of important topics.", "Focus on one chapter at a time."],
            "Appetite Changes": ["Eat small regular meals.", "Stay hydrated with water/juices."]
        },
        Psychomotor: {
            "Restlessness": ["Practice meditation exercises.", "Try grounding techniques."],
            "Pacing": ["Short guided relaxation.", "Sit in a comfortable position."],
            "Fatigue": ["20-30 min power nap.", "Gentle physical stretching."],
            "Social Withdrawal": ["Talk to one trusted person daily.", "Spend time in shared spaces."],
            "Appetite Balance": ["Follow regular meal timings.", "Choose balanced, small portions."]
        },
        Cognitive: {
            "Poor Concentration": ["Study in a quiet place.", "Remove all digital distractions."],
            "Forgetfulness": ["Revision within 24 hours.", "Use flashcards or mind maps."],
            "Negative Thinking": ["Practice positive self-talk.", "Challenge unrealistic thoughts."],
            "Self-Doubt": ["Recall one past success.", "Acknowledge your efforts."],
            "Decision Difficulty": ["Set a 5-10 min time limit.", "Commit to the chosen choice."]
        },
        Affective: {
            "Irritability": ["Take a 5-minute pause.", "Count to ten before reacting."],
            "Mood Swings": ["Maintain a regular routine.", "Track triggers in a journal."],
            "Sadness": ["Express feelings through writing.", "Talk to a trusted friend."],
            "Emotional Exhaustion": ["Take a 15-20 min light walk.", "Listen to soothing music."]
        }
    };

    let currentDomain = "";

    function selectDomain(domain) {
        currentDomain = domain;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page2").classList.add("active");
        document.getElementById("domainTitle").innerText = domain + " Challenges";
        
        let list = "";
        for (let prob in data[domain]) {
            list += `<label style="display:flex; align-items:center; font-size:1.2rem; margin-bottom:15px; cursor:pointer; background: #fff; padding: 12px; border-radius: 12px; border: 2px solid #ddd; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
                     <input type="checkbox" value="${prob}" style="width:20px; height:20px; margin-right:15px;"> ${prob}</label>`;
        }
        document.getElementById("problemList").innerHTML = list;
    }

    function showCards() {
        const selected = document.querySelectorAll('#problemList input:checked');
        if (selected.length === 0) return alert("Select at least one challenge!");

        const container = document.getElementById("cards");
        container.innerHTML = "";

        selected.forEach(item => {
            let p = item.value;
            let sols = data[currentDomain][p];
            let solHtml = sols.map((s, i) => `<li>${s}</li>`).join("");

            container.innerHTML += `
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front">${p}</div>
                        <div class="card-back">
                            <strong style="color:#d63031; border-bottom:2px solid #ddd; padding-bottom:8px; margin-bottom:12px; display:block; font-size:1.1rem;">SOLUTIONS:</strong>
                            <ul class="sol-list">${solHtml}</ul>
                        </div>
                    </div>
                </div>`;
        });

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page3").classList.add("active");
    }

    function goHome() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page1").classList.add("active");
    }

    function goBackProblems() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page2").classList.add("active");
    }
</script>
</body>
</html>
