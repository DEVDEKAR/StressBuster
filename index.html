<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL ================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Comic Neue', cursive;
            background-color: #f0f8ff;
            overflow-x: hidden;
        }

        /* Modern Catchy Header */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            background: #ffffff;
            padding: 12px 0;
            border-bottom: 6px solid #2d3436;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .app-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1rem, 4.5vw, 2.2rem);
            color: #2d3436;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .app-header span { color: #d63031; }

        .page {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            padding-top: 80px;
            box-sizing: border-box;
        }

        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ================= PAGE 1 (Landing) ================= */
        #page1 { background: #62c6e2; overflow: hidden; }

        .p1-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 1100px;
            z-index: 5;
            gap: 10px;
        }

        .nurse-frame {
            flex: 1.2;
            height: 75vh;
            background: url('1.jpg') no-repeat center bottom;
            background-size: contain;
        }

        .domain-menu {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        /* Darker, more visible comic decorations */
        .decoration {
            position: absolute;
            font-size: 60px;
            opacity: 0.8; /* Increased opacity for visibility */
            z-index: 1;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.2)); /* Darker shadow */
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-25px) scale(1.1); }
        }

        /* ================= PAGE 2 (Selection) ================= */
        #page2 { background-color: #e3f2fd; }

        .medical-border-frame {
            width: 92%;
            height: 85vh;
            background: url('2.jpg') no-repeat center;
            background-size: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #2d3436;
            border-radius: 25px;
        }

        .problem-content {
            width: 85%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 20px;
            border: 4px solid #62c6e2;
            max-height: 55vh;
            overflow-y: auto;
        }

        /* ================= PAGE 3 (Solutions) ================= */
        #page3 { background: #d48e8e; }

        .p3-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        .p3-nurse-side {
            flex: 1;
            height: 100%;
            background: url('3.jpg') no-repeat left bottom;
            background-size: contain;
        }

        .p3-cards-side {
            flex: 1.5;
            height: 80%;
            margin-right: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 5px solid #2d3436;
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            overflow-y: auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* ================= UI COMPONENTS ================= */
        .btn-main {
            width: 280px;
            padding: 16px;
            background: white;
            border: 4px solid #2d3436;
            border-radius: 15px;
            font-family: 'Bangers';
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 6px 6px 0px #2d3436;
            transition: 0.2s;
        }

        .btn-main:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0px #2d3436; background: #ffeaa7; }

        .nav-btn {
            position: absolute;
            top: 100px;
            left: 20px;
            background: #ff3b3b;
            color: white;
            border: 3px solid black;
            padding: 10px 18px;
            font-family: 'Bangers';
            cursor: pointer;
            z-index: 1100;
            border-radius: 10px;
        }

        .card { width: 240px; height: 180px; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: 4px solid #2d3436; border-radius: 20px;
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .card-front { background: #ff7675; color: white; font-family: 'Bangers'; justify-content: center; align-items: center; font-size: 1.4rem; text-align: center; }
        .card-back { background: #55efc4; transform: rotateY(180deg); text-align: left; }

        .sol-list { margin: 8px 0 0 0; padding-left: 15px; font-weight: bold; font-size: 0.95rem; line-height: 1.4; }

        /* Responsive */
        @media (max-width: 768px) {
            .p1-layout { flex-direction: column; }
            .nurse-frame { height: 45vh; width: 100%; }
            .p3-layout { flex-direction: column; }
            .p3-nurse-side { height: 35vh; width: 100%; background-position: center bottom; }
            .p3-cards-side { width: 90%; margin: 10px auto; height: 50vh; }
            .nav-btn { top: 80px; left: 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>PRASHAMANA: <span>NURTURING THE CAREGIVER</span></h1>
</header>

<div id="page1" class="page active">
    <div class="decoration" style="top:12%; left:8%;">💉</div>
    <div class="decoration" style="bottom:15%; left:5%;">💊</div>
    <div class="decoration" style="top:20%; right:12%;">🏥</div>
    <div class="decoration" style="bottom:10%; right:8%;">❤️</div>
    
    <div class="p1-layout">
        <div class="nurse-frame"></div>
        <div class="domain-menu">
            <h2 style="font-family:'Bangers'; color: white; text-shadow: 4px 4px #2d3436; font-size: 2.2rem;">SELECT DOMAIN</h2>
            <button class="btn-main" onclick="selectDomain('Academic')">📚 Academic</button>
            <button class="btn-main" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
            <button class="btn-main" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
            <button class="btn-main" onclick="selectDomain('Affective')">💛 Affective</button>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 HOME</button>
    <div class="medical-border-frame">
        <div class="problem-content">
            <h2 id="domainTitle" style="font-family:'Bangers'; color: #d63031; text-align: center; font-size: 1.8rem; margin-top:0;"></h2>
            <div id="problemList"></div>
            <button class="btn-main" style="width: 100%; background: #2ecc71; margin-top: 20px;" onclick="showCards()">VIEW SOLUTIONS</button>
        </div>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅ BACK</button>
    <div class="p3-layout">
        <div class="p3-nurse-side"></div>
        <div class="p3-cards-side" id="cards"></div>
    </div>
</div>

<script>
    const data = {
        Academic: {
            "Exam Anxiety": ["Practice deep breathing for 5 minutes.", "Focus on preparation, not the result."],
            "Sleep Disturbance": ["Stop phone use 30 mins before bed.", "Maintain a regular sleep schedule."],
            "Fear of Failure": ["Break syllabus into study goals.", "Celebrate small learning wins."],
            "Result Stress": ["Focus on next improvement step.", "Avoid comparing marks with others."],
            "Performance Pressure": ["5-10 min break every 1 hour.", "Set realistic study targets."],
            "Lack of Motivation": ["Use the Pomodoro technique.", "Reward yourself after a task."],
            "Overwhelmed Syllabus": ["List important topics first.", "Focus on one chapter at a time."],
            "Appetite Changes": ["Eat small regular meals.", "Stay hydrated with water."]
        },
        Psychomotor: {
            "Restlessness": ["Practice meditation exercises.", "Try grounding techniques."],
            "Pacing": ["Short guided relaxation.", "Sit in a comfortable position."],
            "Fatigue": ["20-30 min power nap.", "Gentle physical stretching."],
            "Social Withdrawal": ["Talk to one trusted person daily.", "Spend time in shared spaces."],
            "Appetite Balance": ["Follow regular meal timings.", "Choose balanced, small portions."]
        },
        Cognitive: {
            "Poor Concentration": ["Study in a quiet place.", "Remove digital distractions."],
            "Forgetfulness": ["Revision within 24 hours.", "Use flashcards or mind maps."],
            "Negative Thinking": ["Practice positive self-talk.", "Challenge unrealistic thoughts."],
            "Self-Doubt": ["Recall one past success.", "Acknowledge your efforts."],
            "Decision Difficulty": ["Set a 5-10 min time limit.", "Commit to your choice."]
        },
        Affective: {
            "Irritability": ["Take a 5-minute pause.", "Count to ten before reacting."],
            "Mood Swings": ["Maintain a regular routine.", "Track triggers in a journal."],
            "Sadness": ["Express feelings through writing.", "Talk to a trusted friend."],
            "Emotional Exhaustion": ["Take a 15-20 min light walk.", "Listen to soothing music."]
        }
    };

    let currentDomain = "";

    function selectDomain(domain) {
        currentDomain = domain;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page2").classList.add("active");
        document.getElementById("domainTitle").innerText = domain + " Challenges";
        
        let list = "";
        for (let prob in data[domain]) {
            list += `<label style="display:flex; align-items:center; font-size:1.1rem; margin-bottom:12px; cursor:pointer; background: #fff; padding: 10px; border-radius: 12px; border: 2px solid #eee; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
                     <input type="checkbox" value="${prob}" style="width:18px; height:18px; margin-right:12px;"> ${prob}</label>`;
        }
        document.getElementById("problemList").innerHTML = list;
    }

    function showCards() {
        const selected = document.querySelectorAll('#problemList input:checked');
        if (selected.length === 0) return alert("Please select a challenge!");

        const container = document.getElementById("cards");
        container.innerHTML = "";

        selected.forEach(item => {
            let p = item.value;
            let sols = data[currentDomain][p];
            let solHtml = sols.map(s => `<li>${s}</li>`).join("");

            container.innerHTML += `
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front">${p}</div>
                        <div class="card-back">
                            <strong style="color:#d63031; border-bottom:2px solid #ddd; padding-bottom:5px; margin-bottom:10px; display:block;">SOLUTIONS:</strong>
                            <ul class="sol-list">${solHtml}</ul>
                        </div>
                    </div>
                </div>`;
        });

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page3").classList.add("active");
    }

    function goHome() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page1").classList.add("active");
    }

    function goBackProblems() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById("page2").classList.add("active");
    }
</script>
</body>
</html>
