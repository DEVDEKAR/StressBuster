<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Stress Buster</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>

/* ================= BACKGROUND ================= */

body{
margin:0;
font-family:'Comic Neue',sans-serif;
text-align:center;

/* Paper texture style */
background:#f4e8d3;
background-image:
radial-gradient(circle at 10% 20%, rgba(0,0,0,0.03) 2%, transparent 3%),
radial-gradient(circle at 80% 60%, rgba(0,0,0,0.03) 2%, transparent 3%);
}

/* Spiral Binding */
body::before{
content:"";
position:fixed;
left:0;
top:0;
width:50px;
height:100%;
background:
repeating-linear-gradient(
to bottom,
#000 0px,
#000 6px,
transparent 6px,
transparent 40px
);
}

/* ================= HERO ================= */

.hero{
background:#ff4757;
color:#fff;
padding:30px;
font-family:'Bangers';
font-size:40px;
text-shadow:3px 3px #000;
border-bottom:6px solid #000;
letter-spacing:2px;
}

/* ================= CARDS ================= */

.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:40px;
}

.card{
width:300px;
height:220px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
transition:transform 0.7s;
transform-style:preserve-3d;
position:relative;
cursor:pointer;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

/* FRONT - BURST STYLE */

.card-front{
position:absolute;
width:100%;
height:100%;
background:#ffd32a;
border:5px solid #000;
clip-path:polygon(
50% 0%, 60% 15%, 80% 10%, 75% 30%,
100% 40%, 75% 50%, 85% 75%,
60% 65%, 50% 100%, 40% 65%,
15% 75%, 25% 50%, 0% 40%,
25% 30%, 20% 10%, 40% 15%
);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
font-size:20px;
font-weight:bold;
box-shadow:8px 8px 0 #000;
backface-visibility:hidden;
}

/* BACK - SPEECH BUBBLE STYLE */

.card-back{
position:absolute;
width:100%;
height:100%;
background:#74c0fc;
border:5px solid #000;
border-radius:25px;
padding:20px;
box-shadow:8px 8px 0 #000;
transform:rotateY(180deg);
backface-visibility:hidden;
text-align:left;
font-size:16px;
}

.card-back::after{
content:"";
position:absolute;
bottom:-20px;
left:40px;
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-top:20px solid #74c0fc;
}

/* Comic doodles */
.doodle{
position:absolute;
font-size:25px;
opacity:0.6;
}

.star{top:20px; right:30px;}
.heart{bottom:30px; left:30px;}
.bolt{top:50%; left:10px;}

</style>
</head>

<body>

<div class="hero">ANXIETY VS CALMING BREATHS</div>

<div class="card-container">

<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">

<div class="card-front">
💥 EXAM ANXIETY!
</div>

<div class="card-back">
🩺 Nurse Says:
<ul>
<li>Breathe in 4 seconds</li>
<li>Breathe out 4 seconds</li>
<li>Relax shoulders</li>
</ul>
</div>

</div>
</div>

<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">

<div class="card-front">
⚡ HEART RACING!
</div>

<div class="card-back">
🩺 Nurse Says:
<ul>
<li>Close eyes briefly</li>
<li>Focus on slow breathing</li>
<li>Remind yourself you're safe</li>
</ul>
</div>

</div>
</div>

</div>

</body>
</html>
