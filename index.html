<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashamana: Nurturing the Caregiver</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Comic Neue',cursive;
text-align:center;
overflow-x:hidden;
background:#f4f9ff;
position:relative;
}

/* Comic Halftone Layer */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-image:radial-gradient(#cfe2ff 1px, transparent 1px);
background-size:20px 20px;
opacity:0.4;
z-index:-2;
}

/* Medical Decorative Icons */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-image:
url("https://cdn-icons-png.flaticon.com/512/3209/3209265.png"),
url("https://cdn-icons-png.flaticon.com/512/2966/2966485.png"),
url("https://cdn-icons-png.flaticon.com/512/4320/4320371.png");
background-repeat:no-repeat,no-repeat,no-repeat;
background-position:left 30px top 120px,
right 40px bottom 150px,
left 40px bottom 80px;
background-size:110px,100px,90px;
opacity:0.08;
z-index:-1;
pointer-events:none;
}

/* ================= HERO ================= */
.hero{
background:#ff3b3b;
color:yellow;
padding:22px;
font-family:'Bangers';
font-size:30px;
letter-spacing:2px;
text-shadow:3px 3px black;
border-bottom:5px solid black;
}

/* ================= PAGES ================= */
.page{
display:none;
padding:30px 20px;
min-height:100vh;
}

.active{
display:block;
}

/* ================= DOMAIN CARDS ================= */
.domain-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.domain-card{
background:white;
border:4px solid black;
border-radius:20px;
padding:30px;
width:230px;
cursor:pointer;
font-family:'Bangers';
font-size:22px;
box-shadow:6px 6px 0px black;
transition:0.3s;
}

.domain-card:hover{
transform:scale(1.07) rotate(-2deg);
background:#ffeaa7;
}

/* ================= PROBLEM PANEL ================= */
.problem-panel{
background:white;
border:4px solid black;
border-radius:20px;
padding:25px;
max-width:700px;
margin:20px auto;
box-shadow:6px 6px 0px black;
text-align:left;
}

.problem-panel label{
display:block;
margin:12px 0;
font-size:18px;
}

/* ================= BUTTON ================= */
button{
margin-top:15px;
padding:12px 22px;
font-family:'Bangers';
font-size:18px;
background:#ff4757;
color:white;
border:4px solid black;
border-radius:12px;
cursor:pointer;
box-shadow:4px 4px 0px black;
transition:0.2s;
}

button:hover{
background:#e84118;
transform:scale(1.05);
}

/* ================= TOP BAR ================= */
.top-bar{
position:sticky;
top:0;
background:#fff;
padding:12px;
z-index:9999;
border-bottom:4px solid black;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ================= CARDS ================= */
.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.card{
width:90%;
max-width:300px;
height:230px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
transition:transform 0.7s;
transform-style:preserve-3d;
position:relative;
cursor:pointer;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
border:4px solid black;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-weight:bold;
box-shadow:6px 6px 0px black;
text-align:center;
}

.card-front{
background:linear-gradient(45deg,#ff7675,#fd79a8);
color:white;
font-size:18px;
}

.card-back{
background:linear-gradient(45deg,#55efc4,#00cec9);
transform:rotateY(180deg);
color:black;
font-size:15px;
}

@media(min-width:768px){
.card{width:260px;}
}

</style>
</head>

<body>

<div class="hero"> Prashamana: Nurturing the Caregiver💉📚</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Choose Your Domain</h2>
<div class="domain-container">
<div class="domain-card" onclick="selectDomain('Academic')">📚 Academic</div>
<div class="domain-card" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</div>
<div class="domain-card" onclick="selectDomain('Cognitive')">🧠 Cognitive</div>
<div class="domain-card" onclick="selectDomain('Affective')">💛 Affective</div>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<div class="top-bar">
<button onclick="goHome()">⬅ Back to Domains</button>
</div>
<h2 id="domainTitle"></h2>
<div class="problem-panel" id="problemList"></div>
<button onclick="showCards()">💥 Show Solutions</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="top-bar">
<button onclick="goBackProblems()">⬅ Back to Problems</button>
</div>
<h2>Flip Card to Reveal Solutions 💡</h2>
<div class="card-container" id="cards"></div>
</div>

<script>

const data={

Academic:{
"Exam Anxiety":[
"Practice deep breathing for 5 minutes before studying or entering exam hall.",
"Visualize yourself confidently completing the exam successfully."
],
"Sleep Disturbance":[
"Stop using phone 30 minutes before bedtime.",
"Maintain a fixed sleep schedule daily."
],
"Fear of Failure":[
"Break syllabus into small manageable study goals.",
"Reward yourself after completing each small goal."
],
"Result-Related Stress":[
"Focus on your next improvement step instead of marks.",
"Avoid comparing your results with others."
],
"Performance Pressure":[
"Take 5–10 minute break after every 1 hour of study.",
"Stretch your body or hydrate during breaks."
],
"Lack of Motivation":[
"Use the 25-minute Pomodoro study method.",
"Study with a friend for accountability."
],
"Overwhelmed by Syllabus":[
"Make a priority list of important topics first.",
"Start with easier topics to build confidence."
],
"Appetite Changes":[
"Eat small, regular meals even if not very hungry.",
"Drink enough water throughout the day."
]
},

Psychomotor:{
"Restlessness":[
"Practice meditation or grounding exercise.",
"Try 4-4-4 slow breathing technique."
],
"Pacing":[
"Sit down and do short guided relaxation.",
"Play calming instrumental music."
],
"Fatigue":[
"Take a 20–30 minute power nap.",
"Ensure proper hydration and light stretching."
],
"Social Withdrawal":[
"Talk to at least one trusted person daily.",
"Join a small study group for interaction."
],
"Loss of Appetite / Overeating":[
"Follow regular balanced meal timings.",
"Avoid skipping breakfast."
]
},

Cognitive:{
"Poor Concentration":[
"Study in a quiet place and remove distractions.",
"Keep phone on silent or in another room."
],
"Forgetfulness":[
"Do quick revision within 24 hours.",
"Make short summary notes."
],
"Negative Thinking":[
"Practice positive self-talk.",
"Replace negative thoughts with realistic ones."
],
"Self-Doubt":[
"Remind yourself of one past success.",
"Write down one personal strength daily."
],
"Decision-Making Difficulty":[
"Set a 5–10 minute time limit to decide.",
"List quick pros and cons."
]
},

Affective:{
"Irritability":[
"Take a 5-minute pause from task.",
"Do slow breathing before responding."
],
"Mood Swings":[
"Maintain regular routine (sleep, meals, study).",
"Avoid excessive caffeine."
],
"Sadness":[
"Talk to one trusted person.",
"Express feelings through writing or journaling."
],
"Emotional Exhaustion":[
"Take a 15–20 minute relaxation break.",
"Go for a light walk outdoors."
]
}

};

let currentDomain="";

function selectDomain(domain){
currentDomain=domain;
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
document.getElementById("domainTitle").innerText=domain+" Domain Problems";

let list="";
for(let problem in data[domain]){
list+=`<label><input type="checkbox" value="${problem}"> ${problem}</label>`;
}
document.getElementById("problemList").innerHTML=list;
}

function showCards(){
const selected=document.querySelectorAll('#problemList input:checked');
const container=document.getElementById("cards");
container.innerHTML="";

selected.forEach(item=>{
let problem=item.value;
let solutions=data[currentDomain][problem];

container.innerHTML+=`
<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">
<div class="card-front">${problem}</div>
<div class="card-back">
<div>
<strong>Solution 1:</strong><br>${solutions[0]}<br><br>
<strong>Solution 2:</strong><br>${solutions[1]}
</div>
</div>
</div>
</div>`;
});

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function goHome(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page1").classList.add("active");
}

function goBackProblems(){
document.getElementById("page3").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

</script>

</body>
</html>
