<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashamana: Nurturing the Caregiver.</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Comic Neue',cursive;
text-align:center;
overflow-x:hidden;

/* COMIC + MEDICAL BACKGROUND */
background-color:#74b9ff;
background-image:
url("https://i.imgur.com/8Km9tLL.png"), /* halftone */
url("https://cdn-icons-png.flaticon.com/512/3209/3209265.png"), /* nurse */
url("https://cdn-icons-png.flaticon.com/512/2966/2966485.png"), /* stethoscope */
url("https://cdn-icons-png.flaticon.com/512/2966/2966327.png"); /* medical cross */

background-repeat:repeat,no-repeat,no-repeat,no-repeat;
background-size:300px,120px,100px,100px;
background-position:center, top left, bottom right, top right;
}

/* HERO */
.hero{
background:#ff3b3b;
color:yellow;
padding:25px;
font-family:'Bangers';
font-size:32px;
letter-spacing:2px;
text-shadow:3px 3px black;
border-bottom:6px solid black;
}

/* PAGE CONTROL */
.page{display:none;padding:20px;}
.active{display:block;}

/* DOMAIN CARDS */
.domain-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:30px;
}

.domain-card{
background:#fff;
border:5px solid black;
border-radius:20px;
padding:30px;
width:230px;
cursor:pointer;
font-family:'Bangers';
font-size:22px;
box-shadow:8px 8px 0px black;
transition:0.3s;
background-image:url("https://i.imgur.com/8Km9tLL.png");
}

.domain-card:hover{
transform:scale(1.08) rotate(-2deg);
background:#ffeaa7;
}

/* PROBLEM PANEL */
.problem-panel{
background:white;
border:5px solid black;
border-radius:20px;
padding:25px;
max-width:700px;
margin:auto;
box-shadow:8px 8px 0px black;
text-align:left;
background-image:url("https://i.imgur.com/8Km9tLL.png");
}

.problem-panel label{
display:block;
margin:12px 0;
font-size:18px;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px 20px;
font-family:'Bangers';
font-size:18px;
background:#ff4757;
color:white;
border:4px solid black;
border-radius:12px;
cursor:pointer;
box-shadow:4px 4px 0px black;
transition:0.2s;
}

button:hover{
background:#e84118;
transform:scale(1.05);
}

/* FLIP CARDS */
.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:20px;
}

.card{
width:90%;
max-width:300px;
height:230px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
transition:transform 0.7s;
transform-style:preserve-3d;
position:relative;
cursor:pointer;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
border:5px solid black;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-weight:bold;
box-shadow:6px 6px 0px black;
text-align:center;
}

.card-front{
background:linear-gradient(45deg,#ff7675,#fd79a8);
color:white;
font-size:18px;
}

.card-back{
background:linear-gradient(45deg,#55efc4,#00cec9);
transform:rotateY(180deg);
color:black;
font-size:15px;
}

/* TOP BAR */
.top-bar{
position:sticky;
top:0;
background:#ffeaa7;
padding:10px;
z-index:1000;
border-bottom:4px solid black;
}

@media(min-width:768px){
.card{width:260px;}
}

</style>
</head>

<body>

<div class="hero">SUPER NURSE STRESS COMIC HELPER 💉📚</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Choose Your Domain</h2>
<div class="domain-container">
<div class="domain-card" onclick="selectDomain('Academic')">📚 Academic</div>
<div class="domain-card" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</div>
<div class="domain-card" onclick="selectDomain('Cognitive')">🧠 Cognitive</div>
<div class="domain-card" onclick="selectDomain('Affective')">💛 Affective</div>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<div class="top-bar">
<button onclick="goHome()">⬅ Back to Domains</button>
</div>
<h2 id="domainTitle"></h2>
<div class="problem-panel" id="problemList"></div>
<button onclick="showCards()">💥 Show Solutions</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="top-bar">
<button onclick="goBackProblems()">⬅ Back to Problems</button>
</div>
<h2>Flip Card to Reveal Solutions 💡</h2>
<div class="card-container" id="cards"></div>
</div>

<script>

const data={

Academic:{
"Exam Anxiety":[
"Practice deep breathing for 5 minutes.",
"Visualize yourself confidently completing the exam."
],
"Sleep Disturbance":[
"Stop phone use 30 minutes before bedtime.",
"Maintain fixed sleep schedule."
],
"Fear of Failure":[
"Break syllabus into small goals.",
"Reward yourself after completing goals."
],
"Result-Related Stress":[
"Focus on next improvement step.",
"Avoid comparing with others."
],
"Performance Pressure":[
"Take 5–10 minute break every hour.",
"Stretch during study breaks."
],
"Lack of Motivation":[
"Use 25-minute Pomodoro method.",
"Study with a partner."
],
"Overwhelmed by Syllabus":[
"Make priority topic list.",
"Start with easier subjects."
],
"Appetite Changes":[
"Eat small regular meals.",
"Drink enough water."
]
},

Psychomotor:{
"Restlessness":[
"Practice meditation.",
"Try slow 4-4-4 breathing."
],
"Pacing":[
"Sit and do guided relaxation.",
"Play calming music."
],
"Fatigue":[
"Take 20–30 minute power nap.",
"Stay hydrated."
],
"Social Withdrawal":[
"Talk to trusted person daily.",
"Join small study group."
],
"Loss of Appetite / Overeating":[
"Follow balanced meal timings.",
"Avoid skipping breakfast."
]
},

Cognitive:{
"Poor Concentration":[
"Study in quiet place.",
"Keep phone away."
],
"Forgetfulness":[
"Revise within 24 hours.",
"Make short notes."
],
"Negative Thinking":[
"Practice positive self-talk.",
"Replace negative thoughts."
],
"Self-Doubt":[
"Remember past success.",
"Write one strength daily."
],
"Decision-Making Difficulty":[
"Set time limit to decide.",
"List quick pros & cons."
]
},

Affective:{
"Irritability":[
"Take 5-minute pause.",
"Do slow breathing."
],
"Mood Swings":[
"Maintain regular routine.",
"Avoid excess caffeine."
],
"Sadness":[
"Talk to trusted person.",
"Write your feelings."
],
"Emotional Exhaustion":[
"Take relaxation break.",
"Go for light walk."
]
}

};

let currentDomain="";

function selectDomain(domain){
currentDomain=domain;
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
document.getElementById("domainTitle").innerText=domain+" Domain Problems";

let list="";
for(let problem in data[domain]){
list+=`<label><input type="checkbox" value="${problem}"> ${problem}</label>`;
}
document.getElementById("problemList").innerHTML=list;
}

function showCards(){
const selected=document.querySelectorAll('#problemList input:checked');
const container=document.getElementById("cards");
container.innerHTML="";

selected.forEach(item=>{
let problem=item.value;
let solutions=data[currentDomain][problem];

container.innerHTML+=`
<div class="card" onclick="this.classList.toggle('flipped')">
<div class="card-inner">
<div class="card-front">${problem}</div>
<div class="card-back">
<div>
<strong>Solution 1:</strong><br>${solutions[0]}<br><br>
<strong>Solution 2:</strong><br>${solutions[1]}
</div>
</div>
</div>
</div>`;
});

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function goHome(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page1").classList.add("active");
}

function goBackProblems(){
document.getElementById("page3").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

</script>

</body>
</html>
