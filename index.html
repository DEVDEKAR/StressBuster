<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashamana: Nurturing the Caregiver</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL ================= */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Comic Neue', cursive;
    overflow: hidden; /* Keeps it contained like an app */
}

.page {
    display: none;
    width: 100vw;
    height: 100vh;
    position: relative;
}

.active { display: flex; }

/* ================= PAGE 1 (Nurse Left, Domains Right) ================= */
#page1 {
    background: #62c6e2; /* Matches the sky blue in image 1 */
    flex-direction: row;
}

.p1-left {
    flex: 1.2;
    background: url('image_bd2370.jpg') no-repeat bottom center;
    background-size: contain;
}

.p1-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding-right: 50px;
}

.domain-btn {
    width: 250px;
    padding: 20px;
    background: white;
    border: 4px solid black;
    border-radius: 15px;
    font-family: 'Bangers';
    font-size: 22px;
    cursor: pointer;
    box-shadow: 6px 6px 0px black;
    transition: 0.2s;
}

.domain-btn:hover { transform: scale(1.05); background: #ffeaa7; }

/* ================= PAGE 2 (Medical Border Frame) ================= */
#page2 {
    background: white;
    background-image: url('image_bccfcc.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.problem-container {
    width: 50%;
    max-height: 60%;
    background: rgba(255, 255, 255, 0.9);
    padding: 30px;
    border-radius: 20px;
    overflow-y: auto;
    text-align: left;
}

/* ================= PAGE 3 (Nurse Left, Solutions in Quote) ================= */
#page3 {
    background: #d48e8e; /* Matches pink bg of image 3 */
    display: none;
}

.p3-nurse {
    position: absolute;
    left: 0;
    bottom: 0;
    height: 90%;
    width: 40%;
    background: url('image_bccd00.jpg') no-repeat left bottom;
    background-size: contain;
    z-index: 1;
}

/* The White Quote Box Layout */
.quote-box {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 55%;
    height: 70%;
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-sizing: border-box;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    overflow-y: auto;
    z-index: 2;
}

/* ================= FLIP CARDS ================= */
.card {
    width: 200px;
    height: 140px;
    perspective: 1000px;
}

.card-inner {
    width: 100%; height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
    position: relative;
}

.card.flipped .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border: 3px solid black;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    text-align: center;
}

.card-front { background: #ff7675; color: white; font-family: 'Bangers'; }
.card-back { background: #55efc4; transform: rotateY(180deg); font-size: 13px; }

/* Buttons */
.nav-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    font-family: 'Bangers';
    background: #ff3b3b;
    color: white;
    border: 3px solid black;
    cursor: pointer;
    z-index: 100;
}
</style>
</head>
<body>

<div id="page1" class="page active">
    <div class="p1-left"></div>
    <div class="p1-right">
        <h1 style="font-family:'Bangers'; font-size: 45px; text-shadow: 2px 2px white;">CHOOSE DOMAIN</h1>
        <button class="domain-btn" onclick="selectDomain('Academic')">📚 Academic</button>
        <button class="domain-btn" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
        <button class="domain-btn" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
        <button class="domain-btn" onclick="selectDomain('Affective')">💛 Affective</button>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">Back</button>
    <h2 id="domainTitle" style="font-family:'Bangers'; font-size: 35px; margin-top: -50px;"></h2>
    <div class="problem-container" id="problemList"></div>
    <button class="domain-btn" style="margin-top: 20px; background:#2ecc71;" onclick="showCards()">VIEW SOLUTIONS</button>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">Back</button>
    <div class="p3-nurse"></div>
    <div class="quote-box" id="cards">
        </div>
</div>

<script>
const data = {
    Academic: {
        "Exam Anxiety": ["Deep breathing for 5 mins.", "Visualize success."],
        "Sleep Disturbance": ["No phone 30m before bed.", "Fixed schedule."],
        "Fear of Failure": ["Small manageable goals.", "Reward yourself."]
    },
    Psychomotor: {
        "Restlessness": ["Meditation exercise.", "4-4-4 breathing."],
        "Fatigue": ["20m power nap.", "Light stretching."]
    },
    Cognitive: {
        "Concentration": ["Quiet environment.", "Phone on silent."],
        "Self-Doubt": ["Recall past success.", "Write 1 strength daily."]
    },
    Affective: {
        "Irritability": ["5 min pause.", "Slow breathing."],
        "Emotional Exhaustion": ["15m relaxation.", "Outdoor walk."]
    }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Problems";
    
    let list = "";
    for (let prob in data[domain]) {
        list += `<label style="display:block; font-size:22px; margin-bottom:10px;">
                 <input type="checkbox" value="${prob}" style="transform:scale(1.5); margin-right:10px;"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelectorAll('#problemList input:checked');
    const container = document.getElementById("cards");
    container.innerHTML = "";

    selected.forEach(item => {
        let p = item.value;
        let s = data[currentDomain][p];
        container.innerHTML += `
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">${p}</div>
                    <div class="card-back"><b>1:</b> ${s[0]}<br><br><b>2:</b> ${s[1]}</div>
                </div>
            </div>`;
    });

    document.getElementById("page2").classList.remove("active");
    document.getElementById("page3").classList.add("active");
    document.getElementById("page3").style.display = "flex";
}

function goHome() {
    location.reload(); // Simplest way to reset
}

function goBackProblems() {
    document.getElementById("page3").style.display = "none";
    document.getElementById("page2").classList.add("active");
}
</script>
</body>
</html>
